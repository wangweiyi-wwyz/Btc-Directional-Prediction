# 随机森林模型配置

model_type: "random_forest"
model_class: "RandomForestClassifier"

# 模型超参数
params:
  n_estimators: 100       # 树的数量
  max_depth: 10           # 树的最大深度
  min_samples_split: 5    # 分裂所需最小样本数
  min_samples_leaf: 2     # 叶节点最小样本数
  class_weight: "balanced"
  random_state: 42
  n_jobs: -1             # 使用所有CPU核心

# 训练配置
training:
  use_validation: true
  early_stopping: false
