# XGBoost 模型配置

model_type: "xgboost"
model_class: "XGBClassifier"

# 模型超参数
params:
  n_estimators: 100       # 提升轮数
  max_depth: 6            # 树的最大深度
  learning_rate: 0.1      # 学习率
  subsample: 0.8          # 样本采样比例
  colsample_bytree: 0.8   # 特征采样比例
  objective: "binary:logistic"
  eval_metric: "logloss"
  random_state: 42
  n_jobs: -1
  use_label_encoder: false

# 训练配置
training:
  use_validation: true
  early_stopping: true
  early_stopping_rounds: 10
