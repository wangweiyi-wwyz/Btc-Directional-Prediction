# BTC 预测系统 - 基础配置文件
# 此文件包含通用配置，如日志路径、数据路径等

# 通用配置
general:
  project_name: "btc_prediction"
  random_state: 42
  verbose: true

# 数据配置
data:
  data_dir: "data"
  ohlcv_file: "data/btc_ohlc.csv"
  technical_file: "data/btc_technical_data_raw.csv"
  macro_file: "data/macro_data_raw.csv"
  start_date: "2016-01-01"
  end_date: "2024-06-30"

# 输出配置
output:
  checkpoint_dir: "checkpoints"
  figure_dir: "figures"
  log_dir: "logs"
  results_dir: "results"

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_handler: true
  console_handler: true

# 设备配置
device:
  use_cuda: true
  cuda_device: 0
  num_workers: 4
